services:
  # Backend API
  - type: web
    name: sistema-inmobiliario-backend
    env: node
    rootDir: .
    buildCommand: "npm install"
    startCommand: "node index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: cyt_database
      - key: DB_PORT
        value: 5432
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /
    autoDeploy: true
